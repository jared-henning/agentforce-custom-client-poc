<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Agent API Demo</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Agentforce Demo</h1>
            <div class="status">
                <span class="status-dot"></span>
                <span id="statusText">Connected</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message agent">
                <div class="message-content">
                    Hello! I'm your Agentforce agent. How can I help you today?
                </div>
            </div>
        </div>

        <div class="input-container">
            <button id="newSessionButton">New Session</button>
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type your message..."
                    autocomplete="off"
                >
            </div>
            <button id="sendButton">Send</button>
        </div>
    </div>

    <script>
        let sessionId = null;
        let isProcessing = false;

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const newSessionButton = document.getElementById('newSessionButton');
        const statusText = document.getElementById('statusText');

        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'agent'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Use innerHTML for agent messages to render HTML formatting, textContent for user messages
            if (isUser) {
                contentDiv.textContent = text;
            } else {
                contentDiv.innerHTML = text;
            }

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            scrollToBottom();

            return contentDiv;
        }

        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator active';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = `Error: ${message}`;
            chatContainer.appendChild(errorDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function setProcessing(processing) {
            isProcessing = processing;
            sendButton.disabled = processing;
            messageInput.disabled = processing;
            statusText.textContent = processing ? 'Agent thinking...' : 'Connected';
        }

        async function startSession() {
            try {
                statusText.textContent = 'Starting session...';
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error('Failed to start session');
                }

                const data = await response.json();
                sessionId = data.sessionId;
                statusText.textContent = 'Connected';
                console.log('Session started:', sessionId);
            } catch (error) {
                console.error('Error starting session:', error);
                showError('Failed to start session. Please check your credentials.');
                statusText.textContent = 'Error';
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !sessionId || isProcessing) return;

            addMessage(message, true);
            messageInput.value = '';
            setProcessing(true);
            addTypingIndicator();

            try {
                const response = await fetch('/api/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to send message');
                }

                const data = await response.json();
                removeTypingIndicator();

                if (data.response) {
                    addMessage(data.response, false);
                } else {
                    showError('No response received from agent. Please try again.');
                }

                setProcessing(false);

            } catch (error) {
                console.error('Error sending message:', error);
                removeTypingIndicator();
                showError('Failed to send message. Please try again.');
                setProcessing(false);
            }
        }

        async function newSession() {
            if (sessionId) {
                try {
                    await fetch('/api/end', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId: sessionId })
                    });
                } catch (error) {
                    console.error('Error ending session:', error);
                }
            }

            chatContainer.innerHTML = `
                <div class="message agent">
                    <div class="message-content">
                        Hello! I'm your Agentforce agent. How can I help you today?
                    </div>
                </div>
            `;

            await startSession();
        }

        sendButton.addEventListener('click', sendMessage);
        newSessionButton.addEventListener('click', newSession);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        startSession();
    </script>
</body>
</html>
